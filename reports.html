<style>
  :root {
    --bg: #f8f6f3;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --text-weak: #9ca3af;
    --accent: #1e40af;
    --accent-hover: #1e3a8a;
    --divider: rgba(0,0,0,0.06);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --font-heading: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
    --font-body: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif;
    --font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 32px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    margin-bottom: 32px;
    letter-spacing: 0.3px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent-hover); }

  .page-header { margin-bottom: 40px; }
  .page-header h1 {
    font-family: var(--font-heading);
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .page-header .sub {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* ── REPORT LIST ── */
  .report-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .report-item {
    background: var(--card);
    border-radius: 8px;
    padding: 22px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s ease, transform 0.15s ease;
    text-decoration: none;
    color: inherit;
    border-left: 3px solid transparent;
  }
  .report-item:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
    border-left-color: var(--accent);
  }

  .report-info { display: flex; flex-direction: column; gap: 4px; }
  .report-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    transition: color 0.15s;
  }
  .report-item:hover .report-name { color: var(--accent); }
  .report-code {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-weak);
    font-weight: 500;
  }
  .report-market {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    background: rgba(30,64,175,0.07);
    color: var(--accent);
    border-radius: 4px;
    margin-top: 4px;
    width: fit-content;
  }

  .report-arrow {
    font-size: 18px;
    color: var(--text-weak);
    transition: transform 0.2s, color 0.2s;
    flex-shrink: 0;
    margin-left: 20px;
  }
  .report-item:hover .report-arrow {
    transform: translateX(4px);
    color: var(--accent);
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-weak);
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--divider);
    line-height: 1.8;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .container { padding: 24px 18px; }
    .page-header h1 { font-size: 28px; }
    .report-item { padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 10px; }
    .report-arrow { align-self: flex-end; margin-left: 0; margin-top: -28px; }
  }
</style>
</head>
